<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CoHomes</title>
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <div class="fake-body">
    <!-- overlay -->
    <div class="overlay">

    </div>

    <!-- navigation menu -->
    <nav class="navbar">
      <div class="logo_container">
        <img src="./image/coHomes_logo.png" alt="coHomes logo" class="logo_text">
        <p class="logo_text">
          <span>co</span>
          Homes
        </p>
      </div>

      <div class="nav_links">
        <p>
          <a href="">Home</a>
        </p>
        <p>
          <a href="">Properties</a>
        </p>
        <p>
          <a href="">Find roommates</a>
        </p>
        <p>
          <a href="">Explore</a>
        </p>
        <a href="">Blog</a>
        </p>
      </div>


      <div class="action_buttons">
        <span class=" login"><a href="">Login</a></span>
        <span class="register"><a href="">Register</a></span>
      </div>
    </nav>

    <!-- hero section -->
    <div class="hero">
      <p class="hero_text">Elegant Villa in <br> Wuse 2 </p>
      <p class="hero_sub_text">3 BD | 3 BA </p>
      <div class="hero_img_container">
        <img src="./image/hero_img_1.png" alt="">
        <img src="./image/hero_img_2.png" alt="">
        <img src="./image/hero_img_3.png" alt="">
      </div>
    </div>
    
    <!-- Rent, Buy and roommate -->
    <div class="r-b-r">
      <p class="Rent">Rent</p>
      <p class="Buy">Buy</p>
      <p class="roommate">Roommate</p>
    </div>
    <div class="quick_search">
      <div>
        <p class="search_heading">Location <img src="./icons/down_arrow.svg" alt=""></p>
        <p class="search_option">Abuja</p>
      </div>
      <div>
        <p class="search_heading">Property Type <img src="./icons/down_arrow.svg" alt=""></p>
        <p class="search_option">Condo</p>
      </div>
      <div>
        <p class="search_heading">Bedroom <img src="./icons/down_arrow.svg" alt=""></p>
        <p class="search_option">2</p>
      </div>
      <div>
        <p class="search_heading">Max Price <img src="./icons/down_arrow.svg" alt=""></p>
        <p class="search_option"><img src="./icons/naira_sign.svg" alt=""> 250,000</p>
      </div>
      <span>
        <img src="./icons/search.svg" class="search" alt="">
      </span>
    </div>
  </div>


  <!-- my own work searching -->
  <div class="searching_for_a_property">

    <img src="./icons/searching_for_property.svg" alt="">
  </div>
  <div class="searching_s_f_h_a">
    <img src="./image/search_self.png" alt="">
    <img src="./image/search_flats.png" alt="">
  </div>
  <div class="houses">
    <img src="./image/search_houses.png" alt="">
  </div>
  <div class="apartments">
    <img src="./image/search_apartments.png" alt="">
  </div>
  >

  </div>
  </div>
  </div>
  </div>


  </div>
  </div>
  </div>
</body>

</html>
